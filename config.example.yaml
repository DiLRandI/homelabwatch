server:
  listenAddr: ":8080"

storage:
  dataDir: "./data"
  dbPath: "./data/homelabwatch.db"

frontend:
  staticDir: "./web/dist"

discovery:
  seedDockerSocket: true
  seedCidrs:
    - "192.168.1.0/24"
  defaultScanPorts:
    - 22
    - 80
    - 443
    - 8080
    - 8443

security:
  trustedCidrs:
    - "127.0.0.1/32"
    - "192.168.0.0/16"
